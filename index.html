<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Loja - Lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <nav class="nav nav-pills mb-4">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="listar.html">Ver Produtos</a>
        <a class="nav-link" href="cadastro.html">Cadastrar</a>
    </nav>

    <h2>Lista de Produtos</h2>
    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Preço (R$)</th>
                <th>Ações</th> </tr>
        </thead>
        <tbody id="tabela-corpo">
            </tbody>
    </table>

    <script>
        // Função para buscar dados do Backend (já existia, mas foi atualizada)
        async function carregarProdutos() {
            try {
                const resposta = await fetch('http://localhost:3000/produtos');
                const produtos = await resposta.json();
                
                const corpoTabela = document.getElementById('tabela-corpo');
                corpoTabela.innerHTML = ''; // Limpa antes de preencher

                produtos.forEach(produto => {
                    // Adicionamos o botão "Apagar" chamando a função deletarProduto passando o ID
                    const linha = `
                        <tr>
                            <td>${produto.id}</td>
                            <td>${produto.nome}</td>
                            <td>R$ ${produto.preco.toFixed(2)}</td>
                            <td>
                                <button class="btn btn-danger btn-sm" onclick="deletarProduto(${produto.id})">
                                    Apagar
                                </button>
                            </td>
                        </tr>
                    `;
                    corpoTabela.innerHTML += linha;
                });
            } catch (erro) {
                alert("Erro ao conectar com o servidor.");
                console.error(erro);
            }
        }

        // NOVA FUNÇÃO: Faz a requisição DELETE para o Backend
        async function deletarProduto(id) {
            // Um pequeno alerta para evitar que o usuário apague sem querer
            const confirmacao = confirm("Tem certeza que deseja apagar este produto?");
            
            if (confirmacao) {
                try {
                    const resposta = await fetch(`http://localhost:3000/produtos/${id}`, {
                        method: 'DELETE' // Avisamos ao servidor que queremos deletar
                    });

                    if (resposta.ok) {
                        alert('Produto apagado com sucesso!'); // Alerta de sucesso exigido
                        carregarProdutos(); // Atualiza a tabela na tela automaticamente
                    } else {
                        alert('Erro ao tentar apagar o produto.');
                    }
                } catch (erro) {
                    console.error(erro);
                    alert("Erro de conexão com o servidor.");
                }
            }
        }

        // Carrega assim que a página abre
        carregarProdutos();
    </script>
</body>
</html>
