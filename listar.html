<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Loja - Lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <nav class="nav nav-pills mb-4">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="listar.html">Ver Produtos</a>
        <a class="nav-link" href="cadastro.html">Cadastrar</a>
    </nav>

    <h2>Lista de Produtos</h2>
    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Preço (R$)</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            </tbody>
    </table>

    <script>
        // Função para buscar dados do Backend
        async function carregarProdutos() {
            try {
                const resposta = await fetch('http://localhost:3000/produtos');
                const produtos = await resposta.json();
                
                const corpoTabela = document.getElementById('tabela-corpo');
                corpoTabela.innerHTML = ''; // Limpa antes de preencher

                produtos.forEach(produto => {
                    const linha = `
                        <tr>
                            <td>${produto.id}</td>
                            <td>${produto.nome}</td>
                            <td>${produto.preco.toFixed(2)}</td>
                        </tr>
                    `;
                    corpoTabela.innerHTML += linha;
                });
            } catch (erro) {
                alert("Erro ao conectar com o servidor. O backend está rodando?");
                console.error(erro);
            }
        }

        // Carrega assim que a página abre
        carregarProdutos();
    </script>
</body>
</html>
