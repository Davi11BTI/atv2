<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Loja - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <nav class="nav nav-pills mb-4">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="listar.html">Ver Produtos</a>
        <a class="nav-link active" href="cadastro.html">Cadastrar</a>
    </nav>

    <h2>Cadastrar Novo Produto</h2>
    <form id="form-cadastro" class="mt-4 col-md-6">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome do Produto</label>
            <input type="text" class="form-control" id="nome" required>
        </div>
        <div class="mb-3">
            <label for="preco" class="form-label">Preço (R$)</label>
            <input type="number" class="form-control" id="preco" step="0.01" required>
        </div>
        <button type="submit" class="btn btn-success">Salvar Produto</button>
    </form>

    <script>
        document.getElementById('form-cadastro').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evita que a página recarregue

            const nome = document.getElementById('nome').value;
            const preco = document.getElementById('preco').value;

            const dados = { nome, preco };

            try {
                const resposta = await fetch('http://localhost:3000/produtos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });

                if (resposta.ok) {
                    alert('Produto cadastrado com sucesso!');
                    // Limpar formulário
                    document.getElementById('form-cadastro').reset();
                } else {
                    alert('Erro ao cadastrar.');
                }
            } catch (erro) {
                console.error(erro);
                alert("Erro de conexão.");
            }
        });
    </script>
</body>
</html>
